bundle:
  name: turbine_project_dab

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name
    default: turbine_project
  
  schema_bronze:
    description: Bronze schema name
    default: bronze
  
  schema_silver:
    description: Silver schema name
    default: silver
  
  schema_gold:
    description: Gold schema name
    default: gold

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-1931d209-edbc.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    
    variables:
      catalog: turbine_project
      schema_bronze: bronze
      schema_silver: silver
      schema_gold: gold
