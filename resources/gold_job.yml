resources:
  jobs:
    tp_gold:
      name: tp_gold_${bundle.target}

      max_concurrent_runs: 1

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:
        - task_key: gold_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/gold_layer_analytics.py
          environment_key: default
